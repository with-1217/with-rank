<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WITH RANK</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .topbar {
      background: #0f172a;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .wrap {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0;
      font-size: 18px;
      color: #4b5563;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="topbar">WITH RANK</div>

  <div class="wrap">
    <div class="card">
      <h1>플레이스 순위 체크</h1>
      <p>with-rank 프로젝트가 정상적으로 열렸습니다.</p>
    </div>
  </div>

</html>

<!DOCTYPE html>
<html lang="ko" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="Content-Language" content="ko" />
  <title>WITH RANK</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
      background:#f4f7fb;
      color:#111827;
    }
    .topbar{
      height:72px;
      background:#0f172a;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      font-size:22px;
    }
    .brand img{
      height:36px;
      width:auto;
      display:block;
      object-fit:contain;
    }
    .logout{
      background:#22d3b6;
      color:#0f172a;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .card{
      background:#fff;
      border-radius:18px;
      padding:24px;
      box-shadow:0 10px 24px rgba(15, 23, 42, 0.06);
      margin-bottom:20px;
    }
    h1{
      margin:0 0 10px;
      font-size:32px;
    }
    p{
      margin:0;
      color:#6b7280;
      line-height:1.7;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="/logo.png" alt="WITH 로고" />
      <span>WITH RANK</span>
    </div>
    <button class="logout">로그아웃</button>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>플레이스 순위 체크</h1>
      <p>with-rank 새 프로젝트가 정상적으로 열렸습니다.</p>
    </div>
  </div>
</body>
</html>
